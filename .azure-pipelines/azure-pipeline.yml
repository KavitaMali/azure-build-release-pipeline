trigger:
  branches:
    include:
      - main
  paths:
    include:
      - AzurePortfolioAPI/**
      - AzurePortfolioAPI.Tests/**
      - docker/**
      - infra/**
      - .azure-pipelines/**

variables:
  serviceConnection: 'azure-service-connection'
  location: 'eastus'
  projectName: 'portfolioapi'
  dockerfilePath: 'docker/Dockerfile'
  imageTag: '$(Build.BuildId)'

stages:

# ============================================
# STAGE 1 - BUILD & TEST
# ============================================
- stage: Build
  displayName: 'Build and Test'
  jobs:
  - job: BuildAndTest
    displayName: 'Build, Test and Publish'
    pool:
      name: Default
    steps:

    - task: UseDotNet@2
      displayName: 'Use .NET 8 SDK'
      inputs:
        packageType: sdk
        version: '8.0.x'

    - task: DotNetCoreCLI@2
      displayName: 'Restore API packages'
      inputs:
        command: restore
        projects: 'AzurePortfolioAPI/AzurePortfolioAPI.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Restore Test packages'
      inputs:
        command: restore
        projects: 'AzurePortfolioAPI.Tests/AzurePortfolioAPI.Tests.csproj'

    - task: DotNetCoreCLI@2
      displayName: 'Build API'
      inputs:
        command: build
        projects: 'AzurePortfolioAPI/AzurePortfolioAPI.csproj'
        arguments: '--configuration Release --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Build Tests'
      inputs:
        command: build
        projects: 'AzurePortfolioAPI.Tests/AzurePortfolioAPI.Tests.csproj'
        arguments: '--configuration Release --no-restore'

    - task: DotNetCoreCLI@2
      displayName: 'Run unit tests'
      inputs:
        command: test
        projects: 'AzurePortfolioAPI.Tests/AzurePortfolioAPI.Tests.csproj'
        arguments: '--configuration Release --no-build'

    - task: DotNetCoreCLI@2
      displayName: 'Publish API'
      inputs:
        command: publish
        publishWebProjects: false
        projects: 'AzurePortfolioAPI/AzurePortfolioAPI.csproj'
        arguments: '--configuration Release --output $(Build.ArtifactStagingDirectory)/publish'

    - task: PublishBuildArtifacts@1
      displayName: 'Publish build artifact'
      inputs:
        pathToPublish: '$(Build.ArtifactStagingDirectory)/publish'
        artifactName: 'api-artifact'

# ============================================
# STAGE 2 - DEPLOY ACR + RESOURCE GROUP ONLY
# ============================================
- stage: Infrastructure
  displayName: 'Deploy Infrastructure (ACR only)'
  dependsOn: Build
  condition: succeeded()
  jobs:
  - job: DeployInfra
    displayName: 'Deploy Resource Group and ACR'
    pool:
      name: Default
    steps:

    - checkout: self

    - task: AzureCLI@2
      displayName: 'Deploy Resource Group and ACR'
      inputs:
        azureSubscription: $(serviceConnection)
        scriptType: batch
        scriptLocation: inlineScript
        inlineScript: |
          echo Deploying Resource Group and ACR...
          az deployment sub create ^
            --name "infra-$(Build.BuildId)" ^
            --location $(location) ^
            --template-file infra/main.bicep ^
            --parameters infra/main.parameters.json ^
            --parameters environment=dev
          echo Infrastructure deployed!

# ============================================
# STAGE 3 - BUILD & PUSH DOCKER IMAGE
# ============================================
- stage: Docker
  displayName: 'Build and Push Docker Image'
  dependsOn: Infrastructure
  condition: succeeded()
  jobs:
  - job: DockerBuildPush
    displayName: 'Docker Build and Push to ACR'
    pool:
      name: Default
    steps:

    - checkout: self

    - task: AzureCLI@2
      displayName: 'Build and Push Docker image to ACR'
      inputs:
        azureSubscription: $(serviceConnection)
        scriptType: batch
        scriptLocation: inlineScript
        inlineScript: |
          echo Getting ACR name...
          for /f "tokens=*" %%a in ('az acr list --resource-group rg-$(projectName)-dev --query "[0].name" -o tsv') do set ACR_NAME=%%a
          echo ACR Name: %ACR_NAME%
          echo Logging into ACR...
          az acr login --name %ACR_NAME%
          echo Building Docker image...
          docker build -f $(dockerfilePath) -t %ACR_NAME%.azurecr.io/$(projectName):$(imageTag) -t %ACR_NAME%.azurecr.io/$(projectName):latest .
          echo Pushing Docker image...
          docker push %ACR_NAME%.azurecr.io/$(projectName):$(imageTag)
          docker push %ACR_NAME%.azurecr.io/$(projectName):latest
          echo Docker image pushed successfully!

# ============================================
# STAGE 4 - DEPLOY CONTAINER APP TO DEV
# ============================================
- stage: DeployDev
  displayName: 'Deploy to Dev'
  dependsOn: Docker
  condition: succeeded()
  jobs:
  - deployment: DeployDev
    displayName: 'Deploy Container App - Dev'
    pool:
      name: Default
    environment: 'dev'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: AzureCLI@2
            displayName: 'Deploy Container App to Dev'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: batch
              scriptLocation: inlineScript
              inlineScript: |
                echo Getting ACR details...
                for /f "tokens=*" %%a in ('az acr list --resource-group rg-$(projectName)-dev --query "[0].name" -o tsv') do set ACR_NAME=%%a
                for /f "tokens=*" %%a in ('az acr credential show --name %ACR_NAME% --query "passwords[0].value" -o tsv') do set ACR_PASSWORD=%%a

                echo Creating Container Apps Environment if not exists...
                az containerapp env create ^
                  --name cae-$(projectName)-dev ^
                  --resource-group rg-$(projectName)-dev ^
                  --location $(location) ^
                  2>nul || echo Environment already exists

                echo Deploying Container App...
                az containerapp create ^
                  --name ca-$(projectName)-dev ^
                  --resource-group rg-$(projectName)-dev ^
                  --environment cae-$(projectName)-dev ^
                  --image %ACR_NAME%.azurecr.io/$(projectName):$(imageTag) ^
                  --registry-server %ACR_NAME%.azurecr.io ^
                  --registry-username %ACR_NAME% ^
                  --registry-password %ACR_PASSWORD% ^
                  --target-port 8080 ^
                  --ingress external ^
                  --min-replicas 0 ^
                  --max-replicas 1 ^
                  --env-vars ASPNETCORE_ENVIRONMENT=dev ^
                  2>nul || az containerapp update ^
                  --name ca-$(projectName)-dev ^
                  --resource-group rg-$(projectName)-dev ^
                  --image %ACR_NAME%.azurecr.io/$(projectName):$(imageTag)

                echo Getting app URL...
                for /f "tokens=*" %%a in ('az containerapp show --name ca-$(projectName)-dev --resource-group rg-$(projectName)-dev --query "properties.configuration.ingress.fqdn" -o tsv') do set APP_URL=%%a
                echo.
                echo ============================================
                echo App deployed at: https://%APP_URL%
                echo ============================================

# ============================================
# STAGE 5 - DEPLOY TO PROD
# Manual approval required
# ============================================
- stage: DeployProd
  displayName: 'Deploy to Prod'
  dependsOn: DeployDev
  condition: succeeded()
  jobs:
  - deployment: DeployProd
    displayName: 'Deploy Container App - Prod'
    pool:
      name: Default
    environment: 'prod'
    strategy:
      runOnce:
        deploy:
          steps:

          - checkout: self

          - task: AzureCLI@2
            displayName: 'Deploy Infrastructure for Prod'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: batch
              scriptLocation: inlineScript
              inlineScript: |
                echo Deploying Prod infrastructure...
                az deployment sub create ^
                  --name "infra-prod-$(Build.BuildId)" ^
                  --location $(location) ^
                  --template-file infra/main.bicep ^
                  --parameters infra/main.parameters.json ^
                  --parameters environment=prod
                echo Prod infrastructure deployed!

          - task: AzureCLI@2
            displayName: 'Deploy Container App to Prod'
            inputs:
              azureSubscription: $(serviceConnection)
              scriptType: batch
              scriptLocation: inlineScript
              inlineScript: |
                echo Getting ACR details...
                for /f "tokens=*" %%a in ('az acr list --resource-group rg-$(projectName)-dev --query "[0].name" -o tsv') do set ACR_NAME=%%a
                for /f "tokens=*" %%a in ('az acr credential show --name %ACR_NAME% --query "passwords[0].value" -o tsv') do set ACR_PASSWORD=%%a

                echo Creating Prod Container Apps Environment...
                az containerapp env create ^
                  --name cae-$(projectName)-prod ^
                  --resource-group rg-$(projectName)-prod ^
                  --location $(location) ^
                  2>nul || echo Environment already exists

                echo Deploying Prod Container App...
                az containerapp create ^
                  --name ca-$(projectName)-prod ^
                  --resource-group rg-$(projectName)-prod ^
                  --environment cae-$(projectName)-prod ^
                  --image %ACR_NAME%.azurecr.io/$(projectName):$(imageTag) ^
                  --registry-server %ACR_NAME%.azurecr.io ^
                  --registry-username %ACR_NAME% ^
                  --registry-password %ACR_PASSWORD% ^
                  --target-port 8080 ^
                  --ingress external ^
                  --min-replicas 0 ^
                  --max-replicas 1 ^
                  --env-vars ASPNETCORE_ENVIRONMENT=prod ^
                  2>nul || az containerapp update ^
                  --name ca-$(projectName)-prod ^
                  --resource-group rg-$(projectName)-prod ^
                  --image %ACR_NAME%.azurecr.io/$(projectName):$(imageTag)

                for /f "tokens=*" %%a in ('az containerapp show --name ca-$(projectName)-prod --resource-group rg-$(projectName)-prod --query "properties.configuration.ingress.fqdn" -o tsv') do set APP_URL=%%a
                echo.
                echo ============================================
                echo Prod app deployed at: https://%APP_URL%
                echo ============================================